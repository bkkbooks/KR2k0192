body:
  text: 會稽記軼雲蔽日四明山高峰軼雲連岫蔽日秦望會稽秦望山為衆峰之傑陟境便見史記云秦始皇登之以望南海自平地以取山頂七里縣嶝孤危峭路險絶記云扳蘿捫葛然後能升山上無高木當由地逈多風所致山南有嶕峴峴裏有大城越不無餘之舊都也映發會稽境特多名山水峰崿隆峻吐納雲霧松栝楓柏摧幹竦條澄壑鏡徹清流寫注白樓江夏太守宋輔於重山南白樓亭立學教授沛國桓儼避地至會稽聞陳業賢而往候之不見臨去入交州留書繫白樓亭柱而別孫興公許玄度共在白樓亭共商略先往名達林公既非所關聽訖云二賢故自有才情亭在山陰臨流映壑也
